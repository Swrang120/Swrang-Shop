<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - MS Shopping</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <div class="logo">🛍️ MS Shopping</div>
</header>

<h2 class="title">Checkout</h2>

<div class="checkout">

<h3>Delivery Address</h3>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="mobile" placeholder="Mobile Number">

<textarea id="address" placeholder="Full Address"></textarea>

<input type="text" placeholder="City">

<input type="text" placeholder="State">

<input type="text" placeholder="PIN Code">


<h3>Payment Method</h3>

<label>
<input type="radio" name="pay" value="upi">
 UPI Payment (Advance ₹100)
</label>

<br><br>

<label>
<input type="radio" name="pay" value="cod">
 Cash On Delivery
</label>


<div id="upiBox" style="display:none; margin-top:20px;">

<h3>Pay Using UPI</h3>

<p><b>Navi UPI:</b> swrangboro48@nyes</p>

<p><b>PhonePe UPI:</b> swrangboro4739@axl</p>

<button class="buy" onclick="copyUPI()">
Copy UPI ID
</button>

</div>


<br>

<button class="buy" onclick="placeOrder()">
Place Order
</button>


</div>


<script>

let upi = document.querySelector('input[value="upi"]');
let cod = document.querySelector('input[value="cod"]');
let box = document.getElementById("upiBox");


upi.onclick=function(){
 box.style.display="block";
}

cod.onclick=function(){
 box.style.display="none";
}


function copyUPI(){

navigator.clipboard.writeText("swrangboro48@nyes");

alert("UPI ID Copied");

}


function placeOrder(){

let payment=document.querySelector('input[name="pay"]:checked');


if(!payment){

alert("Please select payment method");

return;

}


if(payment.value=="upi"){

alert("Please complete ₹100 advance payment first.");

return;

}


alert("🎉 Order Placed Successfully!");

window.location.href="index.html";

}

</script>

</body>
</html>
