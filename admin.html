<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

    <div class="logo">🛍️ MS Shopping - Admin</div>
</header>

<h3>Manage Products</h3>

<button class="cart">Edit Product</button>
<button class="cart">Delete Product</button>

</div>
