<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MS Shopping</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🛍️ MS Shopping</div>

  <input type="text" class="search" placeholder="Search Products...">

  <div class="menu">
    <button onclick="window.location.href='wishlist.html'">❤️</button>
    <button onclick="window.location.href='cart.html'">🛒</button>
    <button onclick="window.location.href='profile.html'">👤</button>
  </div>
</header>

<section class="hero">
  <h1>Welcome to MS Shopping</h1>
  <p>India's Trusted Online Shopping Store</p>
  <button onclick="shopNow()">Shop Now</button>
</section>

<div class="offer">
  🔥 Mega Sale - Up To 70% OFF On Mobiles, Fashion & Electronics
</div>

<h2 class="title">Shop by Category</h2>

<div class="categories">

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Mobile">
    <h3>Mobiles</h3>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Fashion">
    <h3>Fashion</h3>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Electronics">
    <h3>Electronics</h3>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Shoes">
    <h3>Shoes</h3>
  </div>

</div>
