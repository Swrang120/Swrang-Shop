<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo">🛍️ MS Shopping</div>

    <input type="text" placeholder="Search Products..." class="search">

    <div class="menu">
        <button>❤️</button>
        <button>🛒</button>
        <button>👤</button>
    </div>

</header>

<section class="hero">
    <h1>Welcome to MS Shopping</h1>
    <p>Best Deals • Fast Delivery • Secure Advance Payment</p>
    <button onclick="shopNow()">Shop Now</button>
</section>

<h2 class="title">Categories</h2>

<div class="categories">

    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Mobile</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Fashion</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Shoes</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Electronics</h3>
    </div>

</div>

<h2 class="title">Featured Products</h2>

<div class="products">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" alt="Mobile">
        <h3>iPhone 15 Pro</h3>
        <p class="price">₹1,19,999</p>
        <p>⭐⭐⭐⭐⭐</p>
        <button class="cart">Add To Cart</button>
        <button class="buy">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Shoes">
        <h3>Nike Shoes</h3>
        <p class="price">₹4,999</p>
        <p>⭐⭐⭐⭐☆</p>
        <button class="cart">Add To Cart</button>
        <button class="buy">Buy Now</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
